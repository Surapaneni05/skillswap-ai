version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: skillswap-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: skillswapdb
      MYSQL_USER: ${MYSQL_USER:-skillswap}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-skillswap123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - skillswap-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: skillswap-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/skillswapdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-skillswap}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-skillswap123}
      JWT_SECRET: ${JWT_SECRET:-mySecretKey1234567890abcdefghijklmnopqrstuvwxyz}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - skillswap-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: skillswap-frontend
    restart: always
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080}
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - skillswap-network

volumes:
  mysql_data:

networks:
  skillswap-network:
    driver: bridge
